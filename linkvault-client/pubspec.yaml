name: linkvault_client
description: LinkVault client for Android and Windows.
publish_to: none
version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter
  file_selector: ^1.0.4
  flutter_secure_storage: ^10.0.0
  http: ^1.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - config/server.json
    - assets/images/app_icon.png
    - assets/images/login_background.jpg
