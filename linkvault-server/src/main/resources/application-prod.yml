spring:
  datasource:
    url: ${LINKVAULT_DATASOURCE_URL:jdbc:postgresql://postgres:5432/linkvault}
    username: ${LINKVAULT_DATASOURCE_USERNAME:linkvault}
    password: ${LINKVAULT_DATASOURCE_PASSWORD:linkvault}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  data:
    redis:
      host: ${LINKVAULT_REDIS_HOST:redis}
      port: ${LINKVAULT_REDIS_PORT:6379}

linkvault:
  storage:
    endpoint: ${LINKVAULT_MINIO_ENDPOINT:http://minio:9000}
    public-endpoint: ${LINKVAULT_MINIO_PUBLIC_ENDPOINT:http://localhost:9000}
    access-key: ${LINKVAULT_MINIO_ACCESS_KEY:linkvault}
    secret-key: ${LINKVAULT_MINIO_SECRET_KEY:linkvault-secret}
    bucket: ${LINKVAULT_MINIO_BUCKET:linkvault}

logging:
  level:
    com.linkvault: INFO
