services:
  linkvault-api:
    build:
      context: ../..
      dockerfile: Dockerfile
    container_name: linkvault-api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      SPRING_PROFILES_ACTIVE: prod
      LINKVAULT_DATASOURCE_URL: jdbc:postgresql://postgres:5432/linkvault
      LINKVAULT_DATASOURCE_USERNAME: linkvault
      LINKVAULT_DATASOURCE_PASSWORD: linkvault
      LINKVAULT_REDIS_HOST: redis
      LINKVAULT_REDIS_PORT: 6379
      LINKVAULT_MINIO_ENDPOINT: http://minio:9000
      LINKVAULT_MINIO_PUBLIC_ENDPOINT: http://localhost:9000
      LINKVAULT_MINIO_ACCESS_KEY: linkvault
      LINKVAULT_MINIO_SECRET_KEY: linkvault-secret
      LINKVAULT_MINIO_BUCKET: linkvault
    ports:
      - "8080:8080"

  postgres:
    image: postgres:16-alpine
    container_name: linkvault-postgres
    environment:
      POSTGRES_DB: linkvault
      POSTGRES_USER: linkvault
      POSTGRES_PASSWORD: linkvault
    ports:
      - "5432:5432"
    volumes:
      - linkvault-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U linkvault -d linkvault"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: linkvault-redis
    ports:
      - "6379:6379"
    volumes:
      - linkvault-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: linkvault-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: linkvault
      MINIO_ROOT_PASSWORD: linkvault-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - linkvault-minio-data:/data

  minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    container_name: linkvault-minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set linkvault http://minio:9000 linkvault linkvault-secret; do sleep 2; done &&
      mc mb --ignore-existing linkvault/linkvault
      "

volumes:
  linkvault-postgres-data:
  linkvault-redis-data:
  linkvault-minio-data:
